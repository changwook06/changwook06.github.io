<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
    <style>
      :root {
        --bg: #000;
        --text: #fff;
        --card-bg: #111;
        --card-border: #222;
        --nav-text: rgba(255, 255, 255, 0.6);
        --muted: #b9b9b9;
        --subtle-text: #d6d6d6;
        --soft-text: #e8e8e8;
        --icon-border: #333;
        --icon-bg: rgba(255, 255, 255, 0.06);
        --toggle-border: rgba(255, 255, 255, 0.15);
        --toggle-hover-bg: rgba(255, 255, 255, 0.12);
        --soft-border: rgba(255, 255, 255, 0.08);
        --hover-border: #3a3a3a;
        --overlay-bg: rgba(0, 0, 0, 0.9);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        margin: 0;
        width: 100%;
        min-height: 100%;
        background: transparent;
        color: var(--text);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      body {
        overflow-x: hidden;
      }

      html {
        scroll-behavior: smooth;
      }

      .app {
        position: relative;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      .app.theme-dark {
        --bg: #000;
        --text: #fff;
        --card-bg: #111;
        --card-border: #222;
        --nav-text: rgba(255, 255, 255, 0.6);
        --muted: #b9b9b9;
        --subtle-text: #d6d6d6;
        --soft-text: #e8e8e8;
        --icon-border: #333;
        --icon-bg: rgba(255, 255, 255, 0.05);
        --toggle-border: rgba(255, 255, 255, 0.15);
        --toggle-hover-bg: rgba(255, 255, 255, 0.12);
        --soft-border: rgba(255, 255, 255, 0.08);
        --hover-border: #3a3a3a;
        --overlay-bg: rgba(0, 0, 0, 0.9);
      }

      .app.theme-light {
        --bg: #f5f5f0;
        --text: #111;
        --card-bg: #fff;
        --card-border: #ddd;
        --nav-text: rgba(0, 0, 0, 0.5);
        --muted: #666;
        --subtle-text: #3f3f3f;
        --soft-text: #222;
        --icon-border: #c7c7c2;
        --icon-bg: rgba(0, 0, 0, 0.04);
        --toggle-border: rgba(0, 0, 0, 0.22);
        --toggle-hover-bg: rgba(0, 0, 0, 0.08);
        --soft-border: rgba(0, 0, 0, 0.12);
        --hover-border: #bababa;
        --overlay-bg: rgba(245, 245, 240, 0.9);
      }

      .canvas-bg {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
      }

      .content-layer {
        position: relative;
        z-index: 1;
      }

      .top-left-toggles {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 4;
        display: flex;
        gap: 8px;
      }

      .icon-toggle {
        width: 28px;
        height: 28px;
        border: 1px solid var(--toggle-border);
        border-radius: 50%;
        background: var(--icon-bg);
        color: var(--text);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s ease, border-color 0.2s ease;
      }

      .icon-toggle:hover {
        background: var(--toggle-hover-bg);
      }

      .theme-icon,
      .diamond-icon {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .layout {
        display: flex;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: 220px;
        padding: 96px 30px 30px;
        border-right: 1px solid var(--soft-border);
        backdrop-filter: blur(2px);
        z-index: 3;
      }

      .sidebar-nav {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .nav-item {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--nav-text);
        text-decoration: none;
        text-transform: lowercase;
        font-size: 13px;
        letter-spacing: 0.04em;
        opacity: 0.88;
      }

      .nav-item:hover {
        opacity: 1;
        color: var(--text);
      }

      .active-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--text);
        display: inline-block;
      }

      .main {
        margin-left: 220px;
        width: calc(100% - 220px);
        padding: 74px 56px 80px;
      }

      .section {
        margin-bottom: 90px;
      }

      .section-title {
        text-transform: lowercase;
        font-size: 14px;
        letter-spacing: 0.2em;
        color: var(--muted);
        margin-bottom: 22px;
      }

      .about-wrap {
        display: grid;
        grid-template-columns: 1.4fr 0.8fr;
        gap: 34px;
      }

      .name {
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(40px, 8vw, 72px);
        line-height: 1.02;
        margin: 0 0 12px;
        font-weight: 700;
      }

      .subtitle {
        color: var(--subtle-text);
        margin-bottom: 18px;
      }

      .inline-accent {
        color: #ff9b3f;
        font-weight: 600;
      }

      .bio-list {
        margin: 0;
        padding-left: 20px;
        display: grid;
        gap: 10px;
        color: var(--soft-text);
      }

      .tag {
        display: inline-block;
        border-radius: 4px;
        padding: 1px 6px;
        font-size: 0.94em;
        line-height: 1.4;
        border: 1px solid transparent;
        margin: 0 2px;
      }

      .tag-green {
        background: rgba(58, 199, 114, 0.2);
        border-color: rgba(58, 199, 114, 0.5);
        color: #9ef4c1;
      }

      .tag-indigo {
        background: rgba(100, 112, 255, 0.2);
        border-color: rgba(100, 112, 255, 0.45);
        color: #bec6ff;
      }

      .tag-teal {
        background: rgba(47, 207, 193, 0.2);
        border-color: rgba(47, 207, 193, 0.45);
        color: #99fff6;
      }

      .tag-red {
        background: rgba(255, 95, 95, 0.2);
        border-color: rgba(255, 95, 95, 0.45);
        color: #ffc5c5;
      }

      .tag-yellow {
        background: rgba(255, 212, 73, 0.2);
        border-color: rgba(255, 212, 73, 0.45);
        color: #ffe7a4;
      }

      .socials {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      .social-link {
        color: var(--text);
        text-decoration: none;
        border: 1px solid var(--icon-border);
        border-radius: 999px;
        padding: 5px 12px;
        font-size: 12px;
      }

      .portrait {
        width: 100%;
        min-height: 360px;
        border-radius: 14px;
        border: 1px solid var(--card-border);
        background: linear-gradient(145deg, #1b1b1b, #232323 40%, #343434);
      }

      .life-strip {
        margin-top: 24px;
      }

      .life-track {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding-bottom: 6px;
      }

      .life-photo {
        flex: 0 0 190px;
        height: 112px;
        border-radius: 10px;
        border: 1px solid var(--card-border);
        background-size: cover;
        background-position: center;
      }

      .places-map {
        width: 100%;
        height: 400px;
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--card-border);
      }

      .map-marker {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--text);
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
      }

      .theme-light .map-marker {
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.35);
      }

      .mapboxgl-popup-content {
        border-radius: 8px;
        background: #1a1a1a;
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.15);
        font-size: 13px;
        padding: 6px 12px;
        box-shadow: none !important;
      }

      .mapboxgl-popup-tip {
        display: none;
      }

      .map-fallback {
        color: var(--muted);
        font-size: 13px;
        margin-top: 10px;
      }

      .work-tabs {
        display: flex;
        gap: 20px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }

      .tab {
        border: none;
        background: none;
        color: var(--nav-text);
        text-transform: lowercase;
        cursor: pointer;
        padding: 0 0 8px;
        border-bottom: 2px solid transparent;
      }

      .tab.active {
        color: var(--text);
        border-bottom-color: var(--text);
      }

      .work-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }

      .project-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        padding: 14px;
        transition: transform 0.2s ease, border-color 0.2s ease;
      }

      .project-card:hover {
        transform: translateY(-4px);
        border-color: var(--hover-border);
      }

      .project-preview {
        height: 140px;
        border-radius: 10px;
        margin-bottom: 12px;
      }

      .project-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }

      .project-title {
        margin: 0;
        font-size: 17px;
      }

      .badge {
        border-radius: 999px;
        padding: 2px 10px;
        font-size: 11px;
        color: var(--text);
        white-space: nowrap;
      }

      .badge-orange {
        background: #ff8f2d;
      }

      .badge-gray {
        background: #5b5b5b;
      }

      .project-desc {
        margin: 0 0 11px;
        color: var(--subtle-text);
        font-size: 14px;
        line-height: 1.45;
      }

      .card-links {
        display: flex;
        gap: 14px;
      }

      .card-link {
        color: var(--text);
        text-decoration: none;
        font-size: 12px;
        opacity: 0.9;
      }

      .card-link:hover {
        opacity: 1;
      }

      .list-cards {
        display: grid;
        gap: 10px;
      }

      .list-card {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
        border: 1px solid var(--card-border);
        background: var(--card-bg);
        border-radius: 10px;
        padding: 10px 12px;
      }

      .list-card-left {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .list-title {
        color: var(--text);
        text-decoration: none;
        font-size: 15px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .list-title:hover {
        text-decoration: underline;
      }

      .mini-pill {
        display: inline-block;
        font-size: 10px;
        border-radius: 999px;
        padding: 2px 8px;
        background: rgba(80, 140, 255, 0.2);
        border: 1px solid rgba(80, 140, 255, 0.4);
      }

      .list-date {
        color: var(--muted);
        font-size: 12px;
      }

      .watch-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }

      .watch-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        padding: 12px;
      }

      .watch-title {
        margin: 0 0 8px;
        font-size: 15px;
      }

      .watch-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
        color: var(--subtle-text);
      }

      .watch-type {
        border: 1px solid var(--card-border);
        border-radius: 999px;
        padding: 2px 8px;
        text-transform: lowercase;
      }

      .media-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .media-card {
        border: 1px solid var(--card-border);
        border-radius: 12px;
        overflow: hidden;
        background: var(--card-bg);
        color: var(--text);
        text-decoration: none;
      }

      .media-thumb {
        height: 140px;
      }

      .media-body {
        padding: 12px;
      }

      .media-title {
        margin: 0 0 8px;
        font-size: 15px;
      }

      .media-foot {
        display: flex;
        justify-content: space-between;
        color: var(--subtle-text);
        font-size: 12px;
      }

      .mobile-topbar {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding: 12px 16px;
        z-index: 5;
        border-bottom: 1px solid var(--soft-border);
        background: var(--overlay-bg);
      }

      .hamburger {
        border: 1px solid var(--icon-border);
        background: transparent;
        color: var(--text);
        border-radius: 6px;
        width: 34px;
        height: 34px;
        cursor: pointer;
      }

      .mobile-menu {
        margin-top: 10px;
        display: grid;
        gap: 10px;
      }

      .fade-slide {
        opacity: 0;
        transform: translateY(28px);
        animation-name: fadeSlideUp;
        animation-timing-function: ease-out;
        animation-fill-mode: both;
      }

      .fade-600 {
        animation-duration: 600ms;
      }

      .fade-700 {
        animation-duration: 700ms;
      }

      .fade-800 {
        animation-duration: 800ms;
      }

      .delay-0 {
        animation-delay: 0ms;
      }

      .delay-150 {
        animation-delay: 150ms;
      }

      .delay-200 {
        animation-delay: 200ms;
      }

      .delay-300 {
        animation-delay: 300ms;
      }

      .delay-450 {
        animation-delay: 450ms;
      }

      .delay-500 {
        animation-delay: 500ms;
      }

      .delay-600 {
        animation-delay: 600ms;
      }

      .delay-700 {
        animation-delay: 700ms;
      }

      @keyframes fadeSlideUp {
        from {
          opacity: 0;
          transform: translateY(28px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .diamond-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        pointer-events: none;
        overflow: hidden;
        animation: diamond-overlay-fade 1100ms linear forwards;
      }

      .shockwave-ring {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.6);
        transform: translate(-50%, -50%);
        animation: shockwave-expand 400ms ease-out forwards;
      }

      .shockwave-ring.ring-2 {
        animation-delay: 60ms;
      }

      .shockwave-ring.ring-3 {
        animation-delay: 120ms;
      }

      .diamond-center {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        transform: translate(-50%, -50%);
      }

      .diamond-core {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 80px;
        height: 80px;
        border: 2px solid rgba(255, 255, 255, 0.95);
        transform: translate(-50%, -50%) rotate(45deg) scale(0);
        filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.9));
        animation: diamond-core-burst 450ms forwards;
        animation-delay: 150ms;
      }

      .diamond-core::after {
        content: "";
        position: absolute;
        inset: 16px;
        border: 1.5px solid rgba(255, 255, 255, 0.8);
      }

      .diamond-shard {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 34px;
        height: 34px;
        background: rgba(255, 255, 255, 0.95);
        clip-path: polygon(50% 0%, 100% 50%, 50% 100%);
        transform: translate(-50%, -50%) rotate(45deg);
        opacity: 0;
        animation: shard-fly 350ms ease-in forwards;
        animation-delay: 350ms;
      }

      .diamond-shard.shard-tl {
        --dx: -200px;
        --dy: -200px;
      }

      .diamond-shard.shard-tr {
        --dx: 200px;
        --dy: -200px;
      }

      .diamond-shard.shard-bl {
        --dx: -200px;
        --dy: 200px;
      }

      .diamond-shard.shard-br {
        --dx: 200px;
        --dy: 200px;
      }

      .diamond-particle {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 3px;
        height: 3px;
        background: rgba(255, 255, 255, 0.92);
        transform: translate(-50%, -50%) rotate(var(--angle)) translateX(0) rotate(0deg);
        opacity: 0;
        animation: particle-fly var(--duration) ease-out forwards;
        animation-delay: calc(300ms + var(--delay));
      }

      @keyframes shockwave-expand {
        from {
          width: 0;
          height: 0;
          opacity: 0.6;
        }
        to {
          width: 120vw;
          height: 120vw;
          opacity: 0;
        }
      }

      @keyframes diamond-core-burst {
        0% {
          transform: translate(-50%, -50%) rotate(45deg) scale(0);
          opacity: 0;
        }
        45% {
          transform: translate(-50%, -50%) rotate(45deg) scale(1.08);
          opacity: 1;
        }
        67% {
          transform: translate(-50%, -50%) rotate(45deg) scale(1);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) rotate(45deg) scale(0.7);
          opacity: 0;
        }
      }

      @keyframes shard-fly {
        from {
          transform: translate(-50%, -50%) rotate(45deg);
          opacity: 0;
        }
        to {
          transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(225deg);
          opacity: 0;
        }
      }

      @keyframes particle-fly {
        0% {
          transform: translate(-50%, -50%) rotate(var(--angle)) translateX(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--dist)) rotate(var(--spin));
          opacity: 0;
        }
      }

      @keyframes diamond-overlay-fade {
        0%,
        81% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }

      .contact-form {
        max-width: 520px;
        display: grid;
        gap: 16px;
      }

      .contact-input,
      .contact-textarea {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        color: white;
        font-size: 14px;
        width: 100%;
        outline: none;
      }

      .contact-input:focus,
      .contact-textarea:focus {
        border-color: rgba(255, 255, 255, 0.5);
      }

      .contact-textarea {
        min-height: 120px;
        resize: vertical;
      }

      .contact-submit {
        width: fit-content;
        border: 1px solid white;
        border-radius: 999px;
        background: transparent;
        color: white;
        padding: 8px 18px;
        cursor: pointer;
        transition: background 200ms ease, color 200ms ease;
      }

      .contact-submit:hover {
        background: white;
        color: black;
      }

      @media (max-width: 767px) {
        .sidebar {
          display: none;
        }

        .mobile-topbar {
          display: block;
        }

        .top-left-toggles {
          top: 14px;
          left: 64px;
        }

        .main {
          margin-left: 0;
          width: 100%;
          padding: 88px 18px 50px;
        }

        .about-wrap {
          grid-template-columns: 1fr;
        }

        .portrait {
          min-height: 280px;
        }

        .work-grid,
        .watch-grid,
        .media-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      function TagPill({ className, children }) {
        return <span className={`tag ${className}`}>{children}</span>;
      }

      function CanvasBackground({ isDarkMode }) {
        const canvasRef = useRef(null);
        const mouseRef = useRef({ x: 0, y: 0, active: false });
        const isDarkModeRef = useRef(isDarkMode);

        useEffect(() => {
          isDarkModeRef.current = isDarkMode;
        }, [isDarkMode]);

        useEffect(() => {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext("2d");
          const MAX_STRUCTURED_DIST = 130;
          const MAX_FREE_DIST = 80;
          const MAX_DEPTH = 3;
          let width = 0;
          let height = 0;
          let rafId = 0;
          let nextId = 0;
          const nodes = [];

          const rand = (min, max) => min + Math.random() * (max - min);
          const randInt = (min, max) => Math.floor(rand(min, max + 1));
          const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

          const createNode = ({ x, y, parentId = null, seedId }) => ({
            id: nextId++,
            x,
            y,
            vx: rand(-0.18, 0.18),
            vy: rand(-0.18, 0.18),
            radius: rand(1.5, 3.5),
            parentId,
            seedId,
          });

          const addRecursiveChildren = (parentNode, depth, seedId) => {
            if (depth > MAX_DEPTH) return;
            const childCount = depth === 1 ? randInt(3, 5) : randInt(2, 3);
            const minDist = depth === 1 ? 60 : depth === 2 ? 45 : 30;
            const maxDist = depth === 1 ? 120 : depth === 2 ? 80 : 70;

            for (let i = 0; i < childCount; i += 1) {
              const angle = rand(0, Math.PI * 2);
              const distance = rand(minDist, maxDist);
              const childX = clamp(parentNode.x + Math.cos(angle) * distance, 0, width);
              const childY = clamp(parentNode.y + Math.sin(angle) * distance, 0, height);
              const child = createNode({ x: childX, y: childY, parentId: parentNode.id, seedId });
              nodes.push(child);
              addRecursiveChildren(child, depth + 1, seedId);
            }
          };

          const spawnSeedCluster = (seedX, seedY) => {
            const seed = createNode({ x: seedX, y: seedY, seedId: nextId });
            seed.seedId = seed.id;
            nodes.push(seed);
            addRecursiveChildren(seed, 1, seed.id);
          };

          const spawnSingleNode = (x, y) => {
            const node = createNode({ x: clamp(x, 0, width), y: clamp(y, 0, height), seedId: nextId });
            node.seedId = node.id;
            nodes.push(node);
          };

          const resize = () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * window.devicePixelRatio;
            canvas.height = height * window.devicePixelRatio;
            canvas.style.width = width + "px";
            canvas.style.height = height + "px";
            ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
            for (const node of nodes) {
              node.x = clamp(node.x, 0, width);
              node.y = clamp(node.y, 0, height);
            }
          };

          const sharesLineage = (a, b) =>
            a.parentId === b.id || b.parentId === a.id || (a.parentId !== null && a.parentId === b.parentId);

          const drawLine = (a, b, lineRgb, maxOpacity) => {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const withinUniversal = dist <= MAX_FREE_DIST;
            const withinStructured = dist <= MAX_STRUCTURED_DIST && sharesLineage(a, b);
            if (!withinUniversal && !withinStructured) return;

            const distanceCap = withinUniversal ? MAX_FREE_DIST : MAX_STRUCTURED_DIST;
            const alpha = (1 - dist / distanceCap) * maxOpacity;
            ctx.strokeStyle = `rgba(${lineRgb},${alpha})`;
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          };

          const tick = () => {
            ctx.clearRect(0, 0, width, height);
            const dark = isDarkModeRef.current;
            const lineRgb = dark ? "255,255,255" : "0,0,0";
            const maxOpacity = dark ? 0.35 : 0.15;

            for (let i = 0; i < nodes.length; i += 1) {
              const node = nodes[i];
              node.x += node.vx;
              node.y += node.vy;

              if (node.x <= 0 || node.x >= width) node.vx *= -1;
              if (node.y <= 0 || node.y >= height) node.vy *= -1;

              node.x = clamp(node.x, 0, width);
              node.y = clamp(node.y, 0, height);

              for (let j = i + 1; j < nodes.length; j += 1) {
                drawLine(node, nodes[j], lineRgb, maxOpacity);
              }
            }

            ctx.shadowBlur = 0;
            if (mouseRef.current.active) {
              const m = mouseRef.current;
              for (const node of nodes) {
                const dx = node.x - m.x;
                const dy = node.y - m.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist <= MAX_FREE_DIST) {
                  const alpha = (1 - dist / MAX_FREE_DIST) * maxOpacity;
                  ctx.strokeStyle = `rgba(${lineRgb},${alpha})`;
                  ctx.lineWidth = 0.8;
                  ctx.beginPath();
                  ctx.moveTo(m.x, m.y);
                  ctx.lineTo(node.x, node.y);
                  ctx.stroke();
                }
              }
              ctx.fillStyle = dark ? "rgba(255,255,255,0.65)" : "rgba(15,15,15,0.5)";
              ctx.beginPath();
              ctx.arc(m.x, m.y, 2, 0, Math.PI * 2);
              ctx.fill();
            }

            ctx.shadowBlur = 6;
            ctx.shadowColor = dark ? "rgba(255,255,255,0.4)" : "rgba(0,0,0,0.25)";
            ctx.fillStyle = dark ? "rgba(255,255,255,0.88)" : "rgba(20,20,20,0.8)";
            for (const node of nodes) {
              ctx.beginPath();
              ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.shadowBlur = 0;

            rafId = requestAnimationFrame(tick);
          };

          const onMouseMove = (e) => {
            mouseRef.current = { x: e.clientX, y: e.clientY, active: true };
          };

          const onMouseLeave = () => {
            mouseRef.current.active = false;
          };

          const onMouseDown = (event) => {
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            spawnSingleNode(x, y);
          };

          resize();
          const initialSeeds = randInt(6, 8);
          for (let i = 0; i < initialSeeds; i += 1) {
            spawnSeedCluster(rand(0, width), rand(0, height));
          }
          tick();

          window.addEventListener("resize", resize);
          window.addEventListener("mousemove", onMouseMove);
          window.addEventListener("mouseout", onMouseLeave);
          canvas.addEventListener("mousedown", onMouseDown);

          return () => {
            cancelAnimationFrame(rafId);
            window.removeEventListener("resize", resize);
            window.removeEventListener("mousemove", onMouseMove);
            window.removeEventListener("mouseout", onMouseLeave);
            canvas.removeEventListener("mousedown", onMouseDown);
          };
        }, []);

        return <canvas className="canvas-bg" ref={canvasRef} />;
      }

                <button
                  className="icon-toggle"
                  aria-label="Toggle light and dark mode"
                  onClick={() => setIsDarkMode((prev) => !prev)}
                >
                  {isDarkMode ? <SunIcon /> : <MoonIcon />}
                </button>
                <button
                  className="icon-toggle"
                  aria-label="Trigger diamond burst"
                  onClick={() => {
                    const particles = Array.from({ length: 24 }, (_, idx) => ({
                      id: idx,
                      angle: Math.round(Math.random() * 360),
                      dist: Math.round(80 + Math.random() * 140),
                      spin: Math.round(90 + Math.random() * 270),
                      duration: Math.round(400 + Math.random() * 300),
                      delay: Math.round(Math.random() * 120),
                    }));
                    setDiamondFx((prev) => ({ key: prev.key + 1, active: true, particles }));
                    if (fxTimerRef.current) window.clearTimeout(fxTimerRef.current);
                    fxTimerRef.current = window.setTimeout(() => {
                      setDiamondFx((prev) => ({ ...prev, active: false }));
                    }, 1150);
                  }}
                >
                  <DiamondIcon />
                </button>
              </div>
              {diamondFx.active && (
                <div key={diamondFx.key} className="diamond-overlay">
                  <div className="shockwave-ring ring-1" />
                  <div className="shockwave-ring ring-2" />
                  <div className="shockwave-ring ring-3" />
                  <div className="diamond-center">
                    <div className="diamond-core" />
                    <div className="diamond-shard shard-tl" />
                    <div className="diamond-shard shard-tr" />
                    <div className="diamond-shard shard-bl" />
                    <div className="diamond-shard shard-br" />
                  </div>
                  {diamondFx.particles.map((p) => (
                    <span
                      key={p.id}
                      className="diamond-particle"
                      style={{
                        "--angle": `${p.angle}deg`,
                        "--dist": `${p.dist}px`,
                        "--spin": `${p.spin}deg`,
                        "--duration": `${p.duration}ms`,
                        "--delay": `${p.delay}ms`,
                      }}
                    />
                  ))}
                </div>
              )}

              <div className="layout">
                <Sidebar
                  items={navItems}
                  active={active}
                  onClick={setActive}
                  mobileOpen={mobileOpen}
                  setMobileOpen={setMobileOpen}
                />

                <main className="main">
                  <AboutSection />
                  <WorkSection />
                  <BlogSection />
                  <MediaSection />
                  <WatchlistSection />
                  <PlacesSection />
                  <SayHiSection />
                </main>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
