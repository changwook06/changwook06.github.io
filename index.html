<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link rel="icon" type="image/png" href="./webpage logo.png" />
  <link rel="shortcut icon" type="image/png" href="./webpage logo.png" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Mulish:wght@400;600;700&display=swap');

    :root {
      --bg: #f5f4fb;
      --text: rgba(44, 39, 60, 0.96);
      --text-muted: rgba(80, 73, 102, 0.74);
      --text-faint: rgba(108, 100, 129, 0.62);
      --nav-text: rgba(87, 79, 109, 0.84);
      --soft-text: rgba(54, 47, 75, 0.9);
      --subtle-text: rgba(82, 74, 104, 0.84);
      --muted: rgba(111, 101, 134, 0.72);
      --primary: #8e79c9;
      --secondary: #b49fd9;
      --glass-bg: rgba(255, 255, 255, 0.58);
      --card-bg: rgba(255, 255, 255, 0.56);
      --card-border: rgba(202, 193, 225, 0.7);
      --soft-border: rgba(210, 202, 230, 0.72);
      --row-hover: rgba(255, 255, 255, 0.72);
      --input-border: rgba(188, 179, 214, 0.76);
      --input-focus-border: rgba(142, 121, 201, 0.7);
      --icon-border: rgba(193, 183, 220, 0.82);
      --icon-bg: rgba(255, 255, 255, 0.72);
      --overlay-bg: rgba(245, 244, 251, 0.92);
      --shadow: 0 20px 50px rgba(171, 160, 203, 0.18);
      --inner-glow: inset 0 1px 0 rgba(255, 255, 255, 0.92);
      --font-display: "Inter", system-ui, sans-serif;
      --font-sans: "Inter", system-ui, sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body,
    #root {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: transparent;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 15px;
      line-height: 1.7;
      font-weight: 400;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      overflow-x: hidden;
      background: #f5f4fb;
    }

    a,
    button,
    input,
    textarea {
      font: inherit;
    }

    a {
      color: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      position: relative;
      min-height: 100vh;
      color: var(--text);
      isolation: isolate;
      background: transparent;
    }

    .canvas-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: auto;
    }

    .content-layer {
      position: relative;
      z-index: 1;
    }

    .layout {
      display: flex;
    }

    .sidebar,
    .mobile-topbar,
    .section,
    .blog-page-inner,
    .contact-form,
    .places-map,
    article.project-card,
    .blog-row,
    .watch-shell {
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow), var(--inner-glow);
    }

    .sidebar {
      position: fixed;
      top: 20px;
      left: 20px;
      bottom: 20px;
      width: 230px;
      padding: 32px 24px;
      border-radius: 0;
      z-index: 3;
      overflow: hidden;
    }

    .sidebar-avatar-link {
      position: relative;
      z-index: 1;
      display: inline-flex;
      width: 54px;
      height: 54px;
      margin-bottom: 18px;
      border-radius: 0;
      overflow: hidden;
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
    }

    .sidebar-avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .sidebar::before,
    .section::before,
    .blog-page-inner::before,
    .contact-form::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.82), transparent 34%, transparent 66%, rgba(231, 223, 247, 0.72));
      pointer-events: none;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 1;
    }

    .nav-item {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 10px 14px;
      border-radius: 0;
      color: var(--nav-text);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 11px;
      background: rgba(255, 255, 255, 0.48);
      border: 1px solid transparent;
      transition: transform 220ms ease, color 220ms ease, border-color 220ms ease, box-shadow 220ms ease, background 220ms ease;
    }

    .nav-item:hover {
      color: var(--text);
      transform: translateX(4px);
      border-color: rgba(166, 148, 211, 0.7);
      background: rgba(255, 255, 255, 0.74);
      box-shadow: 0 12px 28px rgba(176, 163, 205, 0.18);
    }

    .active-dot {
      width: 8px;
      height: 8px;
      border-radius: 0;
      background: linear-gradient(135deg, #dfd2f2, #c5e8e5);
      box-shadow: 0 4px 14px rgba(177, 160, 210, 0.34);
      display: inline-block;
      flex-shrink: 0;
    }

    .main {
      margin-left: 270px;
      width: calc(100% - 270px);
      padding: 28px 34px 60px;
    }

    .main-home {
      margin-left: 0;
      width: 100%;
      min-height: 100vh;
      padding: 10px 24px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .section {
      position: relative;
      margin: 0 0 28px;
      padding: 30px;
      max-width: 100%;
      overflow: hidden;
      border-radius: 0;
    }

    .section::after {
      content: "";
      position: absolute;
      left: 30px;
      right: 30px;
      bottom: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(203, 193, 229, 0.9), transparent);
      pointer-events: none;
    }

    .section-about {
      padding-top: 38px;
    }

    .section-title {
      position: relative;
      z-index: 1;
      margin: 0 0 18px;
      color: rgba(120, 106, 156, 0.82);
      text-transform: uppercase;
      letter-spacing: 0.26em;
      font-size: 11px;
      font-family: var(--font-display);
    }

    .name,
    .blog-post-title,
    .watchlist-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(40px, 6vw, 68px);
      line-height: 1.02;
      letter-spacing: 0.04em;
      color: #2e2940;
      text-shadow: none;
      animation: none;
    }

    .subtitle {
      margin: 18px 0 20px;
      color: var(--subtle-text);
      font-size: 17px;
    }

    .inline-accent {
      color: #7d69bb;
      text-shadow: none;
    }

    .bio-list {
      margin: 0;
      padding-left: 20px;
      display: grid;
      gap: 14px;
      color: var(--soft-text);
    }

    .bullet-label {
      color: #7d69bb;
      font-weight: 500;
    }

    .tag,
    .mini-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 28px;
      padding: 5px 12px;
      border-radius: 0;
      border: 1px solid rgba(209, 200, 228, 0.8);
      background: rgba(255, 255, 255, 0.74);
      color: var(--text);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-size: 10px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }

    .tag-green { color: #4f8c79; }
    .tag-indigo { color: #6e74b8; }
    .tag-teal { color: #5f9c98; }
    .tag-purple { color: #8663ad; }
    .tag-red { color: #bb738b; }
    .tag-yellow { color: #b1955d; }

    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }

    .social-link,
    .blog-back,
    .contact-submit,
    .life-arrow,
    .hamburger,
    .tab-button,
    .glass-button {
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 0;
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      text-decoration: none;
      box-shadow: var(--inner-glow), 0 10px 24px rgba(176, 163, 205, 0.14);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, color 180ms ease, background 180ms ease;
    }

    .social-link,
    .contact-submit,
    .tab-button {
      padding: 10px 16px;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .social-link:hover,
    .blog-back:hover,
    .contact-submit:hover,
    .life-arrow:hover:not(:disabled),
    .hamburger:hover,
    .tab-button:hover,
    .glass-button:hover {
      transform: translateY(-2px);
      border-color: rgba(166, 148, 211, 0.75);
      box-shadow: 0 12px 28px rgba(180, 169, 207, 0.2), var(--inner-glow);
      color: var(--text);
    }

    .social-link:active,
    .blog-back:active,
    .contact-submit:active,
    .life-arrow:active,
    .hamburger:active,
    .tab-button:active,
    .glass-button:active {
      transform: translateY(0) scale(0.98);
    }

    .section-about {
      padding-top: 38px;
    }

    .hero-shell {
      position: relative;
      padding: 0;
    }

    .landing-view,
    .landing-view * {
      font-family: "Mulish", system-ui, sans-serif;
    }

    .landing-view {
      width: min(1120px, 100%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: calc(100vh - 28px);
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .landing-topbar {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: -2px;
    }

    .landing-toplink {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      color: rgba(88, 80, 110, 0.72);
    }

    .landing-toplink:hover {
      color: var(--text);
    }

    .hero-intro {
      max-width: 760px;
      margin-bottom: 2px;
    }

    .landing-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 10px;
    }

    .landing-photo {
      width: 72px;
      height: 72px;
      border-radius: 0;
      object-fit: cover;
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }

    .landing-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }

    .landing-badge {
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 14px;
      border-radius: 0;
      border: 1px solid rgba(255, 255, 255, 0.6);
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: rgba(44, 39, 60, 0.8);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .landing-badge::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(115deg, transparent 20%, rgba(255,255,255,0.4) 50%, transparent 80%);
      transform: translateX(-140%);
      animation: badgeSweep 900ms ease-out 1 both;
      animation-delay: var(--badge-delay, 0ms);
      pointer-events: none;
    }

    .hero-card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 20px;
      margin-bottom: 0;
    }

    .hero-card,
    .hero-card-button {
      position: relative;
      min-height: 148px;
      padding: 18px;
      border-radius: 0;
      border: 1px solid var(--card-border);
      background: #ffffff;
      box-shadow: none;
      text-decoration: none;
      overflow: hidden;
      isolation: isolate;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 220ms ease, border-color 220ms ease;
      --cx: 50%;
      --cy: 50%;
      --hue: 0deg;
    }

    .hero-card:hover,
    .hero-card-button:hover {
      transform: translateY(-3px);
      border-color: hsla(var(--hue), 60%, 60%, 0.8);
      box-shadow: 0 0 30px 8px hsla(var(--hue), 80%, 70%, 0.4);
    }

    .hero-card::before,
    .hero-card-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle 300px at var(--cx) var(--cy), hsla(var(--hue), 80%, 70%, 0.4), hsla(var(--hue), 80%, 70%, 0.1), transparent 70%);
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
      z-index: 0;
      animation: hueRotate 2s linear infinite;
    }

    .hero-card:hover::before,
    .hero-card-button:hover::before {
      opacity: 1;
    }


    .hero-card-about { --hue: 180deg; }
    .hero-card-work { --hue: 40deg; }
    .hero-card-blog { --hue: 220deg; }
    .hero-card-watchlist { --hue: 310deg; }
    .hero-card-places { --hue: 130deg; }
    .hero-card-say-hi { --hue: 20deg; }

    @keyframes hueRotate {
      from { filter: hue-rotate(0deg); }
      to { filter: hue-rotate(360deg); }
    }

    .hero-card-large {
      grid-column: span 2;
      min-height: 184px;
    }

    .hero-card-cta {
      grid-column: 1 / -1;
      min-height: 94px;
    }

    .hero-card-icon,
    .hero-card-copy {
      position: relative;
      z-index: 1;
    }

    .hero-card-icon {
      width: 28px;
      height: 28px;
      color: var(--text-muted);
    }

    .hero-card-title {
      margin: 0 0 4px;
      font-size: 18px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .hero-card-subtitle {
      margin: 0;
      color: var(--text-faint);
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      max-width: 26ch;
    }

    @keyframes badgeSweep {
      to {
        transform: translateX(140%);
      }
    }

    @keyframes cardHaloSpin {
      to { transform: rotate(360deg); }
    }

    .landing-pond {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: auto;
    }

    .landing-pond-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .landing-pond-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .life-strip {
      margin-top: 28px;
    }

    .life-arrow {
      width: 42px;
      height: 42px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .life-arrow:disabled {
      opacity: 0.28;
      pointer-events: none;
    }

    .work-tab-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    .tab-button {
      background: rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
      --cx: 50%;
      --cy: 50%;
      --hue: 0deg;
    }

    .tab-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle 120px at var(--cx) var(--cy), hsla(var(--hue), 80%, 70%, 0.4), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 0;
      animation: hueRotate 2s linear infinite;
    }

    .tab-button:hover::before {
      opacity: 1;
    }

    .tab-button.active {
      color: #1a1a1a;
      border-color: rgba(166, 148, 211, 0.75);
      box-shadow: 0 10px 24px rgba(180, 169, 207, 0.2), var(--inner-glow);
    }

    article.project-card,
    .blog-row,
    .media-poster-card {
      border-radius: 0;
      overflow: hidden;
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
    }

    article.project-card:hover,
    .media-poster-card:hover {
      transform: translateY(-3px);
      border-color: rgba(166, 148, 211, 0.72);
      box-shadow: 0 18px 36px rgba(187, 177, 214, 0.22), var(--inner-glow);
    }

    .project-link,
    .blog-arrow,
    .blog-meta {
      color: var(--text-faint);
    }

    .project-link:hover {
      color: var(--primary);
    }

    .blog-list {
      display: grid;
      gap: 16px;
    }

    .blog-row {
      position: relative;
      padding: 24px;
      display: flex;
      align-items: flex-start;
      gap: 22px;
      cursor: pointer;
      transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease, background 220ms ease;
      overflow: hidden;
      --cx: 50%;
      --cy: 50%;
      --hue: 0deg;
    }

    .blog-row::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle 120px at var(--cx) var(--cy), hsla(var(--hue), 80%, 70%, 0.4), transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 0;
      animation: hueRotate 2s linear infinite;
    }

    .blog-row:hover::before {
      opacity: 1;
    }

    .blog-row:hover {
      transform: translateY(-2px);
      border-color: rgba(166, 148, 211, 0.72);
      box-shadow: 0 18px 36px rgba(187, 177, 214, 0.22), var(--inner-glow);
    }

    .blog-row-date {
      width: 160px;
      flex-shrink: 0;
      color: var(--text-faint);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .blog-row-title {
      font-family: var(--font-display);
      font-size: 20px;
      line-height: 1.3;
      color: var(--text);
    }

    .blog-row-tags {
      margin-top: 8px;
      color: var(--text-faint);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .blog-arrow {
      margin-left: auto;
      font-size: 20px;
      line-height: 1;
      text-shadow: 0 0 16px rgba(0, 240, 255, 0.24);
    }

    .watchlist-title {
      font-size: clamp(32px, 5vw, 52px);
      margin-bottom: 10px;
    }

    .watchlist-subtitle {
      margin-bottom: 32px;
      color: var(--text-muted);
    }

    .carousel-label {
      margin-bottom: 14px;
      color: var(--text-faint);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-size: 11px;
      font-family: var(--font-display);
    }

    .media-poster-card {
      position: relative;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.04);
      box-shadow: var(--inner-glow);
      user-select: none;
      -webkit-user-select: none;
    }

    .media-poster-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.14);
      box-shadow: var(--inner-glow);
      transform: translateY(-3px);
    }

    .places-map {
      width: 100%;
      height: calc(100vh - 120px);
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }

    .map-marker {
      width: 12px;
      height: 12px;
      background: #000000;
      border: 2px solid #fff;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .mapboxgl-popup-content {
      border-radius: 0;
      background: rgba(10, 17, 36, 0.86);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: var(--shadow), var(--inner-glow) !important;
      font-size: 13px;
      padding: 8px 12px;
      font-family: var(--font-sans);
      line-height: 1.6;
    }

    .mapboxgl-popup-tip {
      display: none;
    }

    .map-fallback {
      margin-top: 12px;
      color: var(--muted);
    }

    .contact-form {
      position: relative;
      max-width: 640px;
      display: grid;
      gap: 16px;
      padding: 24px;
      border-radius: 0;
    }

    .contact-input,
    .contact-textarea {
      width: 100%;
      padding: 14px 16px;
      border-radius: 0;
      border: 1px solid var(--input-border);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    .contact-input::placeholder,
    .contact-textarea::placeholder {
      color: rgba(255, 255, 255, 0.42);
    }

    .contact-input:focus,
    .contact-textarea:focus {
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 1px rgba(0, 240, 255, 0.2), 0 0 28px rgba(0, 240, 255, 0.1);
      background: rgba(255, 255, 255, 0.08);
    }

    .contact-textarea {
      min-height: 160px;
      resize: vertical;
    }

    .blog-page {
      padding: 28px 34px 60px 270px;
    }

      const photos = [
        "assets/friends%20skating.jpg",
        "assets/friends.jpg",
        "assets/karaoke.jpg",
        "assets/mountain%20with%20dad.jpg",
        "assets/rocket%20club.jpeg",
        "assets/snow.jpg"
      ];
      const [currentIndex, setCurrentIndex] = useState(0);
      const gap = 12;
      const visibleCount = 3;
      const maxIndex = photos.length - visibleCount;

      const scroll = (dir) => {
        setCurrentIndex((prev) => {
          const next = prev + dir;
          if (next < 0) return 0;
          if (next > maxIndex) return maxIndex;
          return next;
        });
      };

      return (
        <div style={{ position: "relative", width: "100%", margin: "24px 0", overflow: "hidden" }}>
          <div 
            style={{ 
              display: "flex", 
              gap: `${gap}px`,
              transform: `translateX(calc(-${currentIndex * (100 / visibleCount)}% - ${currentIndex * (gap / visibleCount)}px + ${currentIndex * (gap / visibleCount)}px))`,
              // Simplified transform logic for 3 visible items with fixed gap:
              // Each item is calc((100% - (gap * 2)) / 3)
              // Moving by index i means moving i * (itemWidth + gap)
              transform: `translateX(-${currentIndex * (100 / visibleCount)}%)`,
              transition: "transform 0.35s ease"
            }}
          >
            {/* Using a more robust calc for the flex basis to ensure 3 items fit exactly with gaps */}
            {photos.map((src, i) => (
              <div 
                key={i} 
                style={{ 
                  flex: `0 0 calc((100% - ${(visibleCount - 1) * gap}px) / ${visibleCount})`,
                  height: "220px",
                  border: "1px solid var(--card-border)",
                  borderRadius: 0
                }}
              >
                <img 
                  src={src} 
                  alt="" 
                  style={{ 
                    width: "100%", 
                    height: "100%", 
                    objectFit: "cover",
                    display: "block"
                  }} 
                />
              </div>
            ))}
          </div>
          <button 
            type="button"
            className="life-arrow" 
            onClick={() => scroll(-1)}
            disabled={currentIndex === 0}
            style={{ 
              position: "absolute", 
              left: "12px", 
              top: "50%", 
              transform: "translateY(-50%)",
              zIndex: 2,
              background: "rgba(255,255,255,0.8)",
              boxShadow: "0 4px 12px rgba(0,0,0,0.1)",
              opacity: currentIndex === 0 ? 0.3 : 1
            }}
          >
            ←
          </button>
          <button 
            type="button"
            className="life-arrow" 
            onClick={() => scroll(1)}
            disabled={currentIndex >= maxIndex}
            style={{ 
              position: "absolute", 
              right: "12px", 
              top: "50%", 
              transform: "translateY(-50%)",
              zIndex: 2,
              background: "rgba(255,255,255,0.8)",
              boxShadow: "0 4px 12px rgba(0,0,0,0.1)",
              opacity: currentIndex >= maxIndex ? 0.3 : 1
            }}
          >
            →
          </button>
        </div>
      );
    }

    function LandingPond() {
      const canvasRef = useRef(null);
      const gridRef = useRef({
        width: 200,
        height: 150,
        buffer1: new Float32Array(200 * 150),
        buffer2: new Float32Array(200 * 150),
        damping: 0.985,
      });
      const frameRef = useRef(0);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const { width: cols, height: rows } = gridRef.current;

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };

        const disturb = (x, y, amplitude, radius) => {
          const { buffer1 } = gridRef.current;
          const gx = Math.floor((x / window.innerWidth) * cols);
          const gy = Math.floor((y / window.innerHeight) * rows);

          for (let i = -radius; i < radius; i++) {
            for (let j = -radius; j < radius; j++) {
              if (gx + i > 0 && gx + i < cols - 1 && gy + j > 0 && gy + j < rows - 1) {
                const dist = Math.sqrt(i * i + j * j);
                if (dist < radius) {
                  buffer1[(gy + j) * cols + (gx + i)] = amplitude;
                }
              }
            }
          }
        };

        const onMouseMove = (e) => {
          if (e.target.closest(".hero-card, .hero-card-button, .trinity-button")) return;
          disturb(e.clientX, e.clientY, 30, 4);
        };

        const onClick = (e) => {
          if (e.target.closest(".hero-card, .hero-card-button, .trinity-button")) return;
          disturb(e.clientX, e.clientY, 100, 10);
        };

        window.addEventListener("resize", resize);
        window.addEventListener("mousemove", onMouseMove);
        window.addEventListener("click", onClick);
        resize();

        const render = () => {
          const { buffer1, buffer2, damping } = gridRef.current;
          
          // Wave propagation
          for (let y = 1; y < rows - 1; y++) {
            for (let x = 1; x < cols - 1; x++) {
              const idx = y * cols + x;
              buffer2[idx] = (
                buffer1[idx - 1] +
                buffer1[idx + 1] +
                buffer1[idx - cols] +
                buffer1[idx + cols]
              ) / 2 - buffer2[idx];
              buffer2[idx] *= damping;
            }
          }

          // Swap buffers
          gridRef.current.buffer1 = buffer2;
          gridRef.current.buffer2 = buffer1;

          // Render
          const imgData = ctx.createImageData(cols, rows);
          for (let i = 0; i < cols * rows; i++) {
            const h = gridRef.current.buffer1[i];
            const baseR = 232, baseG = 245, baseB = 252; // #e8f5fc
            const brightness = Math.max(-6, Math.min(6, h));
            
            const idx = i * 4;
            imgData.data[idx] = baseR + brightness;
            imgData.data[idx + 1] = baseG + brightness;
            imgData.data[idx + 2] = baseB + brightness;
            imgData.data[idx + 3] = 255;
          }

          // Draw upscaled
          const tempCanvas = document.createElement("canvas");
          tempCanvas.width = cols;
          tempCanvas.height = rows;
          tempCanvas.getContext("2d").putImageData(imgData, 0, 0);
          
          ctx.drawImage(tempCanvas, 0, 0, canvas.width, canvas.height);

          frameRef.current = requestAnimationFrame(render);
        };

        frameRef.current = requestAnimationFrame(render);
        return () => {
          cancelAnimationFrame(frameRef.current);
          window.removeEventListener("resize", resize);
          window.removeEventListener("mousemove", onMouseMove);
          window.removeEventListener("click", onClick);
        };
      }, []);

      return (
        <div className="landing-pond" aria-hidden="true">
          <canvas ref={canvasRef} className="landing-pond-canvas" style={{ pointerEvents: "auto" }} />
        </div>
      );
    }

    function PlacesSection() {
      const mapRef = useRef(null);
      const mapContainerRef = useRef(null);
      const [isMapReady, setIsMapReady] = useState(true);

      useEffect(() => {
        window.scrollTo(0, 0);
      }, []);

      useEffect(() => {
        if (!window.mapboxgl || !mapContainerRef.current) return;

        // TODO: replace with your Mapbox public token
        const MAPBOX_TOKEN = "pk.eyJ1IjoiY2hhbmd3b29rMDYiLCJhIjoiY21tNXBsZndqMGFqOTJycHFqemdxeHU3aCJ9.BefiyKZ0Uu00e3E6XWM3dw";
        const hasToken = MAPBOX_TOKEN && MAPBOX_TOKEN !== "YOUR_MAPBOX_PUBLIC_TOKEN";
        setIsMapReady(Boolean(hasToken));
        if (!hasToken) return;

        mapboxgl.accessToken = MAPBOX_TOKEN;
        const map = new mapboxgl.Map({
          container: mapContainerRef.current,
          style: "mapbox://styles/mapbox/light-v11",
          center: [70, 38],
          zoom: 1.8,
        });

        map.dragRotate.disable();
        map.touchZoomRotate.disableRotation();

        const places = [
          { coords: [126.9567, 37.3943], label: "Anyang, South Korea — born here" },
          { coords: [127.3615, 36.3719], label: "KAIST, Daejeon, South Korea — studying here" },
          {
            coords: [46.6753, 24.6877],
            label: "American International School of Riyadh, Saudi Arabia — high school here",
          },
          { coords: [-122.0122, 37.3861], label: "Silicon Valley, USA — future goal" },
          { coords: [2.3522, 48.8566], label: "Paris, France — want to visit" },
        ];

        const cleanupFns = [];
        places.forEach((place) => {
          const markerEl = document.createElement("div");
          markerEl.className = "map-marker";
          const popup = new mapboxgl.Popup({ offset: 14, closeButton: false, closeOnClick: false }).setText(
            place.label
          );
          new mapboxgl.Marker(markerEl).setLngLat(place.coords).addTo(map);

          const onEnter = () => {
            popup.setLngLat(place.coords).addTo(map);
          };

          const onLeave = () => {
            popup.remove();
          };

          markerEl.addEventListener("mouseenter", onEnter);
          markerEl.addEventListener("mouseleave", onLeave);
          cleanupFns.push(() => {
            markerEl.removeEventListener("mouseenter", onEnter);
            markerEl.removeEventListener("mouseleave", onLeave);
            popup.remove();
          });
        });

        mapRef.current = map;
        return () => {
          cleanupFns.forEach((fn) => fn());
          map.remove();
        };
      }, []);

      return (
        <section id="places" className="section fade-slide fade-700 delay-600" style={{ padding: 0, overflow: "hidden", height: "calc(100vh - 120px)" }}>
          <div ref={mapContainerRef} className="places-map" style={{ height: "100%" }} />
          {!isMapReady && (
            <div className="map-fallback" style={{ position: "absolute", top: "20px", left: "20px" }}>Set a Mapbox public token to enable the interactive map.</div>
          )}
        </section>
      );
    }

          <div className={`blog-page ${isLeaving ? "blog-exit" : "blog-enter"}`}>
            <div className="blog-page-inner">
              <button type="button" className="blog-back" onClick={onBack}>
                ← back to blog
              </button>
              <h1 className="blog-post-title">Post not found</h1>
            </div>
          </div>
        );
      }

      return (
        <div className={`blog-page ${isLeaving ? "blog-exit" : "blog-enter"}`}>
          <div className="blog-page-inner">
            <button type="button" className="blog-back" onClick={onBack}>
              ← back to blog
            </button>
            <h1 className="blog-post-title">{post.title}</h1>
            <div className="blog-post-date">{post.date}</div>
            <div className="blog-post-tags">
              {post.tags.map((tag, idx) => (
                <React.Fragment key={tag}>
                  <span className="mini-pill">{tag}</span>
                  {idx < post.tags.length - 1 && <span className="blog-post-dot">•</span>}
                </React.Fragment>
              ))}
            </div>
            {post.image && <img className="blog-post-image" src={post.image} alt={post.title} />}
            <div className="blog-post-content">
              {post.body.map((paragraph, idx) => (
                <p key={idx}>{paragraph}</p>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function PlaceholderSection({ id, title, text }) {
      return (
        <section id={id} className="section">
          <div className="section-title">{title}</div>
          <p style={{ color: "var(--subtle-text)", maxWidth: 700 }}>{text}</p>
        </section>
      );
    }

    function SayHiSection() {
      useEffect(() => {
        window.scrollTo(0, 0);
      }, []);

      return (
        <section id="say-hi" className="section">
          <div className="section-title" style={{ color: "var(--text-faint)" }}>
            say hi
          </div>
          {/* TODO: replace YOUR_FORM_ID with your Formspree endpoint ID */}
          <form className="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
            <input className="contact-input" type="text" name="name" placeholder="your name" required />
            <input className="contact-input" type="email" name="email" placeholder="your email" required />
            <textarea className="contact-textarea" name="message" placeholder="say something..." required />
            <button className="contact-submit" type="submit">
              send it →
            </button>
          </form>
        </section>
      );
    }

    function App() {
      const blogPosts = [

      ];

      const navItems = [
        { id: "about", label: "about" },
        { id: "work", label: "work" },
        { id: "blog", label: "blog" },
        { id: "watchlist", label: "watchlist" },
        { id: "places", label: "places" },
        { id: "say-hi", label: "say hi" },
      ];
      const getViewFromHash = () => {
        const hash = window.location.hash.replace("#", "");
        if (!hash || hash === "home") return "home";
        if (navItems.some((item) => item.id === hash)) return hash;
        return "home";
      };
      const [active, setActive] = useState(() => getViewFromHash());
      const [mobileOpen, setMobileOpen] = useState(false);
      const [currentPage, setCurrentPage] = useState({ type: "view", id: getViewFromHash() });
      const [blogLeaving, setBlogLeaving] = useState(false);
      const openBlogTimerRef = useRef(null);
      const backTimerRef = useRef(null);

      useEffect(() => {
        const syncFromUrl = () => {
          const params = new URLSearchParams(window.location.search);
          const blogIdParam = params.get("blogId");
          const blogId = blogIdParam ? Number(blogIdParam) : NaN;
          const match = blogPosts.find((post) => post.id === blogId);
          if (match) {
            setCurrentPage({ type: "blog", id: match.id });
            setActive("blog");
          } else {
            const view = getViewFromHash();
            setCurrentPage({ type: "view", id: view });
            setActive(view);
          }
        };

        syncFromUrl();
        const onPopState = () => syncFromUrl();
        const onHashChange = () => syncFromUrl();
        window.addEventListener("popstate", onPopState);
        window.addEventListener("hashchange", onHashChange);
        return () => {
          window.removeEventListener("popstate", onPopState);
          window.removeEventListener("hashchange", onHashChange);
        };
      }, []);

      useEffect(() => {
        return () => {
          if (openBlogTimerRef.current) window.clearTimeout(openBlogTimerRef.current);
          if (backTimerRef.current) window.clearTimeout(backTimerRef.current);
        };
      }, []);

      useEffect(() => {
        if (currentPage.type === "blog") {
          window.scrollTo(0, 0);
        }
      }, [currentPage.type]);

      useEffect(() => {
        setBlogLeaving(false);
      }, [currentPage]);

      const navigateToView = (viewId) => {
        setActive(viewId);
        setCurrentPage({ type: "view", id: viewId });
        setMobileOpen(false);
        window.scrollTo(0, 0);
        if (window.location.hash !== `#${viewId}`) {
          window.location.hash = viewId;
        }
      };

      const openBlogPost = (id) => {
        if (openBlogTimerRef.current) window.clearTimeout(openBlogTimerRef.current);
        setCurrentPage({ type: "blog", id });
        window.history.pushState({}, "", `?blogId=${id}#blog`);
      };

      const backToHome = () => {
        setBlogLeaving(true);
        if (backTimerRef.current) window.clearTimeout(backTimerRef.current);
        backTimerRef.current = window.setTimeout(() => {
          setCurrentPage({ type: "view", id: "blog" });
          setActive("blog");
          window.history.pushState({}, "", `${window.location.pathname}#blog`);
        }, 350);
      };

      const activePost =
        currentPage.type === "blog" ? blogPosts.find((post) => post.id === currentPage.id) : null;

      return (
        <div className="app">
          <CanvasBackground />
          <LandingPond />

          <div className="content-layer">
            <div className="layout">
              {currentPage.type === "view" && currentPage.id !== "home" && (
                <Sidebar
                  items={navItems}
                  active={active}
                  onNavigate={navigateToView}
                  mobileOpen={mobileOpen}
                  setMobileOpen={setMobileOpen}
                />
              )}

              {currentPage.type === "blog" ? (
                <BlogPostPage post={activePost} onBack={backToHome} isLeaving={blogLeaving} />
              ) : (
                <main className={`main ${currentPage.id === "home" ? "main-home" : ""}`}>
                  {currentPage.id === "home" && <LandingView navItems={navItems} onNavigate={navigateToView} />}

                  {currentPage.id === "work" && <WorkSection />}
                  {currentPage.id === "blog" && <BlogSection blogPosts={blogPosts} onOpenBlog={openBlogPost} />}
                  {currentPage.id === "watchlist" && <WatchlistSection />}
                  {currentPage.id === "places" && <PlacesSection />}
                  {currentPage.id === "say-hi" && <SayHiSection />}
                </main>
              )}
            </div>
          </div>
        </div>
      );

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
